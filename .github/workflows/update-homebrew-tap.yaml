name: update-homebrew-tap

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync (for example v0.1.0)
        required: true

permissions:
  contents: read

jobs:
  update-tap:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "value=${{ github.event.release.tag_name }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${{ inputs.tag }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout Homebrew tap repository
        uses: actions/checkout@v4
        with:
          repository: mhrabovcin/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.value }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          TAP_DIR: ${{ github.workspace }}/homebrew-tap
        run: ./scripts/release/update-homebrew-formula.sh

      - name: Create pull request in tap repository
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          add-paths: Formula/troubleshoot-live.rb
          commit-message: "chore: update troubleshoot-live ${{ steps.tag.outputs.value }}"
          branch: "automation/troubleshoot-live-${{ steps.tag.outputs.value }}"
          delete-branch: true
          title: "chore: update troubleshoot-live ${{ steps.tag.outputs.value }}"
          body: |
            Automated formula update for `${{ steps.tag.outputs.value }}`.

            Generated from release assets in `${{ github.repository }}`.
